# CAN Bridge Configuration
# 切换实体硬件：将 interface 改为 can0，其余不变

can:
  interface: "vcan0"       # 虚拟 CAN（开发用）→ 实体硬件改为 "can0"
  bustype: "socketcan"
  bitrate: 1000000         # 1 Mbit/s（标准工业机器人 CAN 速率）
  num_joints: 7            # Franka Panda 7 自由度

  # CANopen Node ID 分配（每个关节对应一个驱动器节点）
  node_ids: [1, 2, 3, 4, 5, 6, 7]

  # PDO 帧 ID 偏移（CANopen DS402 标准）
  tpdo1_base: 0x200        # PC → 驱动器（控制指令）
  rpdo1_base: 0x180        # 驱动器 → PC（编码器反馈）

  # 数值编码
  torque_scale: 0.001      # 1 bit = 0.001 N·m
  encoder_resolution: 131072  # 17-bit encoder（每圈脉冲数）

rs485:
  # pymodbus TCP 服务器（软件仿真，无需串口）
  host: "127.0.0.1"
  port: 5020
  # 夹爪寄存器地址
  gripper_cmd_register: 0x0040
  gripper_state_register: 0x0041
