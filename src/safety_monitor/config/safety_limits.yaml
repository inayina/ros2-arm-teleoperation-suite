safety_monitor:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    lower: [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, -0.0175, -2.8973]
    upper: [ 2.8973,  1.7628,  2.8973, -0.0698,  2.8973,  3.7525,  2.8973]
    max_velocity: [2.175, 2.175, 2.175, 2.175, 2.61, 2.61, 2.61]
    soft_limit_margin: 0.05
    watchdog_timeout: 0.1        # seconds; teleop heartbeat + joint_states freshness
    auto_estop_enabled: false   # M4: monitor-only; set true in M5 for watchdog/velocity→E-Stop
    workspace_min: [-0.8, -0.8, 0.0]
    workspace_max: [ 0.8,  0.8, 1.3]
