# MoveIt Servo parameters (L2 motion layer).
# Pose-tracking mode: consume /safe_master_pose, emit /joint_target.
###############################################################################
moveit_servo:
  ros__parameters:
    use_gazebo: false
    command_in_type: "speed_units"      # twist in m/s, rad/s
    scale:
      linear: 0.4
      rotational: 0.8
      joint: 0.5

    # Output to the ros2_control controller as a joint trajectory.
    command_out_topic: /joint_target
    command_out_type: trajectory_msgs/JointTrajectory
    publish_joint_positions: true
    publish_joint_velocities: false
    publish_joint_accelerations: false

    # Incoming pose target (remapped from /safe_master_pose at launch).
    pose_command_in_topic: ~/pose_target_cmds
    cartesian_command_in_topic: ~/delta_twist_cmds

    move_group_name: panda_arm
    planning_frame: panda_link0
    ee_frame_name: panda_ee
    robot_link_command_frame: panda_link0

    publish_period: 0.008               # 125 Hz
    incoming_command_timeout: 0.1

    # Singularity / limit safeguards (the value MoveIt Servo adds over raw IK).
    lower_singularity_threshold: 17.0
    hard_stop_singularity_threshold: 30.0
    joint_limit_margins: [0.1]
    leaving_singularity_threshold_multiplier: 2.0

    check_collisions: true
    collision_check_rate: 10.0
    self_collision_proximity_threshold: 0.01
    scene_collision_proximity_threshold: 0.02
